<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four Game</title>
    <link rel="stylesheet" href="connectfour-style.css">
</head>
<body>
    <div class="container">
        <h1>Connect Four Game</h1>
        
        <div class="game-info">
            <div class="player-info">
                <h2>Current Player: <span id="currentPlayer">Red</span></h2>
                <div id="playerIndicator" class="player-indicator red"></div>
            </div>
            <div class="game-stats">
                <p>Red: <span id="redWins">0</span> | Blue: <span id="blueWins">0</span></p>
            </div>
        </div>

        <div class="game-board">
            <div class="board" id="board"></div>
        </div>

        <div class="column-labels">
            <div class="label">1</div>
            <div class="label">2</div>
            <div class="label">3</div>
            <div class="label">4</div>
            <div class="label">5</div>
            <div class="label">6</div>
            <div class="label">7</div>
        </div>

        <div class="game-message">
            <p id="message">Red's Turn</p>
        </div>

        <div class="button-container">
            <button id="resetBtn" class="btn">New Game</button>
        </div>
    </div>

    <script src="connectfour-script.js"></script>
</body>
</html>
